<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zalo CRM - Liquid Silion</title>
    <style>
      :root {
        --navy-deep: #0A192F;
        --navy-light: #112240;
      }
      @keyframes flow-bg {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      body {
        margin: 0;
        background: linear-gradient(-45deg, #0A192F, #112240, #004d7a, #008fb3);
        background-size: 400% 400%;
        animation: flow-bg 15s ease infinite;
        font-family: sans-serif;
        color: white;
        min-height: 100vh;
      }
      /* Ensure Vuetify app is transparent to show body bg */
      .v-application {
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
