# Cấu hình Nginx cho ZaloCRM
# Tên miền: quanly.khacdaunhanh.vn
# File gợi ý đặt tại: /etc/nginx/sites-available/zalocrm

server {
    listen 80;
    listen [::]:80;
    server_name quanly.khacdaunhanh.vn;

    # Chuyển hướng tự động từ HTTP sang HTTPS (Khi đã cài SSL)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://localhost:3080; # ZaloCRM chạy trên cổng 3080 (Docker host)
        proxy_http_version 1.1;
        
        # Hỗ trợ WebSocket (Quan trọng cho Chat Real-time/Socket.IO)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers chuẩn đảm bảo IP khách hàng được chuyển đúng
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Tăng giới hạn tải lên (Ảnh/File đính kèm)
        client_max_body_size 50M;

        # Timeout cho kết nối dài (như chờ quét QR)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Trang lỗi mặc định
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
